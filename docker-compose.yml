services:
  mysql:
    image: mysql:8.4
    container_name: knee-clinic-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: knee_clinic
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
